services:
  - type: web
    name: crossflow-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: MODEL_PATH
        value: data/models/crossflow_model.joblib
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
