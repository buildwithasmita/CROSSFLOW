version: "3.9"

services:
  backend:
    image: python:3.13-slim
    working_dir: /app/Backend
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app/frontend
    volumes:
      - ./:/app
    command: >
      sh -c "npm install &&
             npm start"
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    depends_on:
      - backend
